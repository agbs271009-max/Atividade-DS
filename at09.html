<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Filmes</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; background-color: #f0f2f5; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; }
        .form-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        input, select, button { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { cursor: pointer; transition: 0.3s; }
        .btn-add { background-color: #007bff; color: white; border: none; }
        .btn-add:hover { background-color: #0056b3; }
        .filmes-lista { display: grid; gap: 10px; margin-top: 20px; }
        .filme-card { border-left: 5px solid #007bff; background: #fff; padding: 10px; border: 1px solid #eee; border-left: 5px solid #007bff; }
        .filme-card h4 { margin: 0; color: #333; }
        .filme-card p { margin: 5px 0 0; font-size: 0.9em; color: #666; }
    </style>
</head>

            <option value="Ficção">Ficção</option>
        </select>
        <input type="number" id="ano" placeholder="Ano">
