<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Filtro de Usuários</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .controles { border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .usuario-card { 
            padding: 10px; 
            border: 1px solid #ddd; 
            margin: 5px 0; 
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            width: 300px;
        }
        .maior { border-left: 5px solid #4CAF50; background-color: #f9fff9; }
        .menor { border-left: 5px solid #f44336; background-color: #fff9f9; }
        button { cursor: pointer; padding: 8px 12px; }
    </style>
</head>
<body>

    <h2>Lista de Usuários</h2>

    <div class="controles">
        <input type="text" id="nome" placeholder="Nome">
        <input type="number" id="idade" placeholder="Idade">
        <button onclick="adicionar()">Cadastrar</button>
    </div>

    <div class="filtros">
        <button onclick="renderizar(usuarios)">Mostrar Todos</button>
        <button onclick="filtrarMaiores()">Mostrar apenas maiores de 18</button>
    </div>

    <div id="listaUsuarios" style="margin-top: 20px;">
        </div>

    <script>
        let usuarios = [
            { nome: "Ana", idade: 25 },
            { nome: "Carlos", idade: 15 },
            { nome: "Beatriz", idade: 19 }
        ];

        function adicionar() {
            const inputNome = document.getElementById("nome");
            const inputIdade = document.getElementById("idade");

            const nome = inputNome.value.trim();
            const idade = parseInt(inputIdade.value);

            if (nome !== "" && !isNaN(idade)) {
                usuarios.push({ nome, idade });
                inputNome.value = "";
                inputIdade.value = "";
                renderizar(usuarios);
            }
        }

        function filtrarMaiores() {
            const maiores = usuarios.filter(u => u.idade >= 18);
            renderizar(maiores);
        }

        function renderizar(listaParaExibir) {
            const container = document.getElementById("listaUsuarios");
            container.innerHTML = "";

            listaParaExibir.forEach(u => {
                const classe = u.idade >= 18 ? "maior" : "menor";
                container.innerHTML += `
                    <div class="usuario-card ${classe}">
                        <span><strong>${u.nome}</strong></span>
                        <span>${u.idade} anos</span>
                    </div>
                `;
            });
        }

        renderizar(usuarios);
    </script>
</body>
</html>
