<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Jogadores</title>

        .container { max-width: 400px; margin: auto; background: #16213e; padding: 20px; border-radius: 10px; border: 1px solid #0f3460; }
        input { padding: 8px; border-radius: 4px; border: none; margin-bottom: 10px; width: 100%; box-sizing: border-box; }

        button:hover { background: #ff4d6d; }
        .ranking-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 10px; 
            border-bottom: 1px solid #0f3460;
            background: rgba(255, 255, 255, 0.05);
            margin-top: 5px;
        }
        .podio { color: #f1c40f; font-weight: bold; } /* Destaque para o primeiro lugar */
    </style>
</head>
<body>

    <input type="text" id="jogador" placeholder="Nome do jogador">

    <button onclick="adicionar()">Adicionar ao Ranking</button>

    <div id="listaRanking" style="margin-top: 20px;">

</div>

            document.getElementById("pontos").value = "";
